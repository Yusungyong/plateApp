name: iOS Beta Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: macos-13

    steps:
      - name: ✅ 워크플로우 시작 확인용
        run: echo "🚀 GitHub Actions 워크플로우 시작됨!"

      - uses: actions/checkout@v3

      - name: Cache Ruby gems
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gem-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gem-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.3
          bundler-cache: true

      - name: Check Ruby version and gem path
        run: |
          echo "🔧 루비 버전 확인 시작"
          ruby -v
          which gem
          gem env

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install JS dependencies
        run: |
          echo "📦 JS 의존성 설치 시작"
          npm install

      - name: Build and Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_CONTENT }}
        run: |
          echo "🚀 Fastlane 빌드 및 TestFlight 배포 시작"
          bundle exec fastlane ios beta
