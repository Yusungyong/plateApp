name: iOS Beta Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: macos-13

    steps:
      - name: ✅ 워크플로우 시작 확인용
        run: echo "🚀 GitHub Actions 워크플로우 시작됨!"

      - uses: actions/checkout@v3

      - name: Cache Ruby gems
        uses: actions/cache@v3
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gem-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gem-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install JS dependencies
        run: |
          echo "📦 JS 의존성 설치 시작"
          npm install --legacy-peer-deps

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Install fastlane (if not using Bundler)
        run: |
          gem install fastlane

      - name: Build and Deploy to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_CONTENT }}
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
        run: |
          echo "🚀 Fastlane 빌드 및 TestFlight 배포 시작"
          cd ios

          # .p8 파일 생성
          mkdir -p fastlane
          echo "$APP_STORE_CONNECT_API_KEY_KEY_CONTENT" > fastlane/AuthKey_${APP_STORE_CONNECT_API_KEY_KEY_ID}.p8

          # Fastlane 실행
          bundle exec fastlane ios beta || fastlane ios beta
