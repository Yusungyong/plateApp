name: iOS Beta Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: macos-13

    steps:
      - name: ✅ 워크플로우 시작 확인용
        run: echo "🚀 GitHub Actions 워크플로우 시작됨!"

      - uses: actions/checkout@v3

      - name: 📁 루트 디렉토리 구조 확인
        run: ls -al

      - name: 🔍 기본 환경 정보 출력
        run: |
          echo "👤 유저: $(whoami)"
          echo "📍 현재 위치: $(pwd)"
          sw_vers
          xcode-select -p
          xcodebuild -version

      - name: 📦 node, ruby, fastlane 버전 확인
        run: |
          node -v
          ruby -v
          gem -v
          fastlane --version || echo "fastlane 없음"

      - name: 🔐 GitHub Actions에서 PAT 인증 curl 테스트
        env:
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
        run: |
          echo "🔍 curl 인증 테스트 시작"
          curl -v -H "Authorization: $GIT_AUTHORIZATION" \
            https://api.github.com/repos/Yusungyong/plate-certificates

      - name: 🧪 git clone 인증서 레포 테스트
        env:
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
        run: |
          git config --global http.https://github.com/.extraheader "Authorization: $GIT_AUTHORIZATION"
          git clone https://github.com/Yusungyong/plate-certificates.git ./cert-clone-test
          echo "📁 인증서 디렉토리:"
          ls -al ./cert-clone-test || echo "❌ clone 실패"

      - name: 📁 ios 디렉토리 구조 확인
        run: |
          cd ios
          ls -al
          cd ..

      - name: 📂 .p8 키 파일 유무 확인
        run: ls -al ios/fastlane || echo "❌ .p8 키 없음"

      - name: 🛠 Fastlane 실행
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_CONTENT }}
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}
        run: |
          echo "🚀 Fastlane 빌드 및 TestFlight 배포 시작"
          cd ios

          mkdir -p fastlane
          echo "$APP_STORE_CONNECT_API_KEY_KEY_CONTENT" > fastlane/AuthKey_NW2M42KU3S.p8
          echo "✅ .p8 키 생성 완료"

          bundle exec fastlane ios beta || fastlane ios beta

      - name: 🪵 Xcode Build Log 출력
        if: failure()
        run: |
          echo "🔍 Xcode Build 실패 로그 출력"
          cat ~/Library/Logs/gym/PlateApp-PlateApp.log || echo "❌ 로그 파일 없음"
