name: iOS Release to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up Ruby (with bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: |
          npm config set fund false
          npm config set audit false
          if [ -f package-lock.json ]; then
            echo "Trying npm ci..."
            if ! npm ci; then
              echo "npm ci failed. Falling back to npm install --legacy-peer-deps"
              npm install --legacy-peer-deps
            fi
          else
            echo "No package-lock.json, using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # 🔹 코드젠 산출물 중복으로 생기는 경고/실패 방지(빌드 전 항상 정리)
      - name: Clean stale codegen
        run: |
          rm -rf ios/build/generated/ios

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # --- 옵션 B: 사인 리소스 설치 ---
      - name: Install signing certificate (p12)
        env:
          DISTRIBUTION_P12_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
        run: |
          echo "$DISTRIBUTION_P12_BASE64" | base64 --decode > signing.p12
          security create-keychain -p "" build.keychain
          security import signing.p12 -k ~/Library/Keychains/build.keychain -P "$DISTRIBUTION_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s ~/Library/Keychains/build.keychain login.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain

      - name: Install provisioning profile (App Store)
        env:
          IOS_PROFILE_APPSTORE: ${{ secrets.IOS_PROFILE_APPSTORE }}
        run: |
          echo "$IOS_PROFILE_APPSTORE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(/usr/bin/security cms -D -i profile.mobileprovision))
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Verify keys (optional)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -f fastlane/AuthKey_${ASC_KEY_ID}.p8 ]; then
            ls -al fastlane
            wc -c fastlane/AuthKey_${ASC_KEY_ID}.p8
          else
            echo "Using ASC_KEY_P8 from env (no file created)"
          fi

      - name: Fastlane Release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          TF_CHANGELOG: "CI auto build"
        run: |
          bundle exec fastlane ios release

      - name: Upload IPA & dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlateApp-artifacts
          path: |
            PlateApp.ipa
            *.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
