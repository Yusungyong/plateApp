name: iOS Release to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up Ruby (with bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true   # Gemfile.lock 기반 fastlane/cocoapods 설치 + 캐시

      # ⬇️ Node + npm 세팅 (RN 스크립트용)
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ⬇️ JS 의존성 설치 (npm ci → 실패 시 legacy peer deps 폴백)
      - name: Install JS dependencies
        run: |
          npm config set fund false
          npm config set audit false
          if [ -f package-lock.json ]; then
            echo "Trying npm ci..."
            if ! npm ci; then
              echo "npm ci failed. Falling back to npm install --legacy-peer-deps"
              npm install --legacy-peer-deps
            fi
          else
            echo "No package-lock.json, using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      # ⬇️ CocoaPods 캐시
      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # ── 여기부터 옵션 B 핵심: 사인 자원 설치 ─────────────────────
      - name: Install signing certificate (p12)
        env:
          IOS_DIST_P12: ${{ secrets.IOS_DIST_P12 }}                 # base64 인코딩된 .p12
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }} # .p12 암호
        run: |
          echo "$IOS_DIST_P12" | base64 --decode > signing.p12
          security create-keychain -p "" build.keychain
          security import signing.p12 -k ~/Library/Keychains/build.keychain -P "$IOS_DIST_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s ~/Library/Keychains/build.keychain login.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain

      - name: Install provisioning profile (App Store)
        env:
          IOS_PROFILE_APPSTORE: ${{ secrets.IOS_PROFILE_APPSTORE }}  # base64 인코딩된 .mobileprovision
        run: |
          echo "$IOS_PROFILE_APPSTORE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(/usr/bin/security cms -D -i profile.mobileprovision))
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # (선택) .p8 파일로 쓰고 싶으면 생성 — 없으면 Fastfile이 ASC_KEY_P8 시크릿 사용
      - name: Create AuthKey file from secret (optional)
        if: ${{ secrets.ASC_KEY_P8 != '' }}
        run: |
          mkdir -p fastlane
          cat > fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 << 'EOF'
          ${{ secrets.ASC_KEY_P8 }}
          EOF

      - name: Verify keys (optional)
        run: |
          if [ -f fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 ]; then
            ls -al fastlane
            wc -c fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          else
            echo "Using ASC_KEY_P8 from env (no file created)"
          fi

      # ── Fastlane 릴리즈 ─────────────────────────────────────────
      - name: Fastlane Release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}        # 파일 없으면 Fastfile이 이 값 사용
          TF_CHANGELOG: "CI auto build"
        run: |
          bundle exec fastlane ios release

      # 산출물 업로드(실패해도 확인 가능)
      - name: Upload IPA & dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlateApp-artifacts
          path: |
            PlateApp.ipa
            *.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
