name: iOS Release to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod --version

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # ⬇️ 여기서 시크릿으로 .p8 파일 생성 (fastlane 디렉토리 안)
      - name: Create AuthKey file from secret
        run: |
          mkdir -p fastlane
          cat > fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 << 'EOF'
          ${{ secrets.ASC_KEY_P8 }}
          EOF

      - name: Fastlane Release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}   # Basic 붙이지 말기
          TF_CHANGELOG: "CI auto build"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: |
          bundle exec fastlane ios release

      - name: Upload IPA & dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlateApp-artifacts
          path: |
            PlateApp.ipa
            *.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
