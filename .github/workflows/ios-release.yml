name: iOS Release to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up Ruby (with bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true   # Gemfile.lock 기반 fastlane / cocoapods 설치 및 캐시

      # ✅ Node + npm 고정 (RN 스크립트용), npm 캐시
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ✅ JS 의존성 설치 (npm ci → 실패 시 legacy-peer-deps 폴백)
      - name: Install JS dependencies
        run: |
          npm config set fund false
          npm config set audit false
          if [ -f package-lock.json ]; then
            echo "Trying npm ci..."
            if ! npm ci; then
              echo "npm ci failed. Falling back to npm install --legacy-peer-deps"
              npm install --legacy-peer-deps
            fi
          else
            echo "No package-lock.json, using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # ⬇️ 시크릿으로 p8 파일 생성 (fastlane 작업 디렉토리 기준: fastlane/ 내부)
      - name: Create AuthKey file from secret
        run: |
          mkdir -p fastlane
          cat > fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 << 'EOF'
          ${{ secrets.ASC_KEY_P8 }}
          EOF

      # ⬇️ 생성 검증 (있고, 크기가 200~400바이트대면 정상: EC 키)
      - name: Verify AuthKey file
        run: |
          ls -al fastlane
          wc -c fastlane/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Fastlane Release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}      # 파일 누락 시 Fastfile에서 fallback로 사용
          GIT_AUTHORIZATION: ${{ secrets.GIT_AUTHORIZATION }}  # Basic 붙이지 말 것
          TF_CHANGELOG: "CI auto build"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
        run: |
          bundle exec fastlane ios release

      - name: Upload IPA & dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlateApp-artifacts
          path: |
            PlateApp.ipa
            *.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
