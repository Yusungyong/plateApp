name: iOS Release to TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Set up Ruby (with bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: |
          npm config set fund false
          npm config set audit false
          if [ -f package-lock.json ]; then
            echo "Trying npm ci..."
            if ! npm ci; then
              echo "npm ci failed. Falling back to npm install --legacy-peer-deps"
              npm install --legacy-peer-deps
            fi
          else
            echo "No package-lock.json, using npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
          fi

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # RN post_install가 build/generated/ios를 청소할 때 해당 폴더가 없으면 실패하는 케이스가 있어 사전 생성
      - name: Ensure RN codegen dir exists
        run: |
          mkdir -p ios/build/generated/ios

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      # --- 사인 리소스 설치 (p12) ---
      - name: Install signing certificate (p12)
        env:
          DISTRIBUTION_P12_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
        run: |
          echo "$DISTRIBUTION_P12_BASE64" | base64 --decode > signing.p12
          security create-keychain -p "" build.keychain
          security import signing.p12 -k ~/Library/Keychains/build.keychain -P "$DISTRIBUTION_P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s ~/Library/Keychains/build.keychain login.keychain-db
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain

      - name: Install provisioning profile (App Store)
        env:
          IOS_PROFILE_APPSTORE: ${{ secrets.IOS_PROFILE_APPSTORE }}
        run: |
          echo "$IOS_PROFILE_APPSTORE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          INFO=$(/usr/bin/security cms -D -i profile.mobileprovision)
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$INFO")
          NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /dev/stdin <<< "$INFO")
          APS=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:aps-environment' /dev/stdin <<< "$INFO" 2>/dev/null || echo "unknown")
          echo "Profile UUID: $UUID"
          echo "Profile Name: $NAME"
          echo "APS Environment: $APS"   # production이면 App Store/Ad Hoc 성격
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$NAME" >> $GITHUB_ENV

      - name: Verify keys (optional)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          if [ -f fastlane/AuthKey_${ASC_KEY_ID}.p8 ]; then
            ls -al fastlane
            wc -c fastlane/AuthKey_${ASC_KEY_ID}.p8
          else
            echo "Using ASC_KEY_P8 from env (no file created)"
          fi

      - name: Fastlane Release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          TF_CHANGELOG: "CI auto build"
          FASTLANE_XCBEAUTIFY_DISABLE: "1"
        run: |
          bundle exec fastlane ios release

      # 실패 시 xcodebuild 로그 일부 노출 (원인 라인 확인)
      - name: Print xcodebuild log tail
        if: failure()
        run: |
          LOG=~/Library/Logs/gym/PlateApp-PlateApp.log
          if [ -f "$LOG" ]; then
            echo "---- First 120 lines ----"
            head -n 120 "$LOG"
            echo "---- Last 200 lines ----"
            tail -n 200 "$LOG"
          else
            echo "Log not found: $LOG"
          fi

      - name: Upload IPA & dSYM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PlateApp-artifacts
          path: |
            PlateApp.ipa
            *.dSYM.zip
            fastlane/report.xml
          if-no-files-found: ignore
